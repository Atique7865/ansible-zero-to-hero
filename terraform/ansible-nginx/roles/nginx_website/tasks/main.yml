---
- name: Install nginx
  ansible.builtin.package:
    name: nginx
    state: present

- name: Ensure web root directory exists
  ansible.builtin.file:
    path: "{{ nginx_web_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Copy index.html to web root
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/files/index.html"
    dest: "{{ nginx_web_root }}/index.html"
    owner: www-data
    group: www-data
    mode: "0644"
  notify: Reload nginx

- name: Deploy nginx virtual host config
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/website
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Enable the site (symlink to sites-enabled)
  ansible.builtin.file:
    src: /etc/nginx/sites-available/website
    dest: /etc/nginx/sites-enabled/website
    state: link
  notify: Reload nginx

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Ensure nginx is started and enabled
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
